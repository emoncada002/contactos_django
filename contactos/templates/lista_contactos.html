<!DOCTYPE html>
<html>
<head>
    <title>Contactos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <h1>Lista de Contactos</h1>
    <a href="{% url 'nuevo_contacto' %}" class="btn btn-primary mb-3">Nuevo Contacto</a>
    <table class="table table-striped">
        <tr>
            <th>Nombre</th>
            <th>Teléfono</th>
            <th>Email</th>
            <th>Acciones</th>
        </tr>
        {% for contacto in contactos %}
        <tr>
            <td>{{ contacto.nombre }}</td>
            <td>{{ contacto.telefono }}</td>
            <td>{{ contacto.email }}</td>
            <td>
                <a href="{% url 'editar_contacto' contacto.id %}" class="btn btn-warning btn-sm">Editar</a>
                <a href="{% url 'eliminar_contacto' contacto.id %}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
